name: Build Mac App
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller -w -F CPK_summary_tool_v4.2.py

      - name: Zip app
        run: |
          cd dist
          zip CPK_tool_mac.zip *.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPK_tool_mac
          path: dist/CPK_tool_mac.zip
